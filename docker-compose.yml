services:
  web:
    build: .
    volumes:
      - ./data:/workspace/data
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=default-secret-key-for-dev-change-in-prod
      - ADMIN_USERNAME
      - ADMIN_PIN
    restart: always

  proxy:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
    restart: always
